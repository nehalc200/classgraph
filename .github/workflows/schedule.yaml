name: Quarterly Catalog Scrapers
on:
  schedule:
    # 4th friday in may (fall schedule)
    - cron: "0 0 19 5 5"
    
    # first friday in november (winter schedule)
    - cron: "0 0 30 10 5"

    # first friday in february (spring schedule)
    - cron: "0 0 29 1 5"
    

jobs:
  run-course-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13.5'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Catalog scraper
        run: |
          python catalog_scraper/main.py

      - name: Run Webreg scraper
        run: |
          go run path/to/your/script.go

      - name: Run cross check and AST
        run: |
          python data/cross_check.py
          python data/ast.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update course data from quarterly scraper"
          branch: scraper-update
          delete-branch: true
          title: "📦 Quarterly Catalog Scraper Update"
          body: |
            Automated update from quarterly catalog scraper.
            
            Run completed on ${{ github.event.repository.updated_at }}
            
            cc @alchin2
          assignees: alchin2

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Quarterly Catalog Scraper Failed',
              body: `Workflow run failed on ${new Date().toISOString()}\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\ncc @alchin2`,
              assignees: ['alchin2']
            })