name: Quarterly Catalog Scrapers
on:
  schedule:
    # Runs every Friday in May at 00:00 UTC
    - cron: "0 0 * 5 5"
    
    # Runs every Friday in November at 00:00 UTC
    - cron: "0 0 * 11 5"

    # Runs every Friday in February at 00:00 UTC
    - cron: "0 0 * 2 5"
    
  # Adding manual trigger so you can test it without waiting for the cron
  workflow_dispatch: 

jobs:
  check-date:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.date_check.outputs.should_run }}
    steps:
      - name: Verify Nth Friday
        id: date_check
        run: |
          MONTH=$(date +%-m)
          DAY=$(date +%-d)
          SHOULD_RUN="false"
          
          # Force run if triggered manually via workflow_dispatch
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger detected."
            SHOULD_RUN="true"
          
          # 4th Friday of May (days 22-28)
          elif [[ "$MONTH" -eq 5 && "$DAY" -ge 22 && "$DAY" -le 28 ]]; then
            echo "Matched 4th Friday of May."
            SHOULD_RUN="true"
            
          # 1st Friday of November (days 1-7)
          elif [[ "$MONTH" -eq 11 && "$DAY" -le 7 ]]; then
            echo "Matched 1st Friday of November."
            SHOULD_RUN="true"
            
          # 1st Friday of February (days 1-7)
          elif [[ "$MONTH" -eq 2 && "$DAY" -le 7 ]]; then
            echo "Matched 1st Friday of February."
            SHOULD_RUN="true"
            
          else
            echo "Not a target Friday. Skipping scraper."
          fi
          
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

  run-course-scraper:
    needs: check-date
    if: needs.check-date.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Catalog scraper
        run: |
          python catalog_scraper/main.py

      - name: Run Webreg scraper
        run: |
          cd soc_scraper/
          go build
          ./soc_scraper
          cd ..

      - name: Run cross check and AST
        run: |
          python data/helpers/cross_check.py
          python data/helpers/ast.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update course data from quarterly scraper"
          branch: scraper-update
          delete-branch: true
          title: "📦 Quarterly Catalog Scraper Update"
          body: |
            Automated update from quarterly catalog scraper.
            
            Run completed on ${{ github.event.repository.updated_at }}
            
            cc @alchin2
          assignees: alchin2

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Quarterly Catalog Scraper Failed',
              body: `Workflow run failed on ${new Date().toISOString()}\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\ncc @alchin2`,
              assignees: ['alchin2']
            })
